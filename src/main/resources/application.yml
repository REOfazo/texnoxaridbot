spring:
  datasource:
    url: jdbc:h2:file:./data/technobotdb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
  h2:
    console:
      enabled: true
      path: /h2-console

telegram:
  bot:
    token: ${BOT_TOKEN}
    username: ${BOT_USERNAME}

app:
  admin-ids: ${ADMIN_IDS}

server:
  port: ${PORT:8080}

logging:
  level:
    uz.technobot: INFO
    org.hibernate.SQL: WARN
